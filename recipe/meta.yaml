{% set version = "6.5.3" %}

package:
  name: kanapy
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/k/kanapy/kanapy-{{ version }}.tar.gz
  sha256: 6ce7997d8fc2a0cbc884be6be170edc07a6d962e702a285dd3d36c59ba321e4f

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy <=2.2.6
    - matplotlib-base
    - scipy
    - seaborn
    - click
    - tqdm
    - jsonschema
    - networkx
    - orix >=0.13
    - scikit-image
    - requests

test:
  imports:
    - kanapy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://icams.github.io/Kanapy/builds/html/index.html
  license: AGPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: 'Python tool for microstructure analysis and generation of 3D microstructure models'
  description: |
    Kanapy is a python toolbox for the generation of 3D microstructure models based on 
    statistical analysis of experimental 2D microstructure maps. Grain orientations are generated 
    based on crystallographic textures.
  doc_url: https://icams.github.io/Kanapy/builds/html/index.html
  dev_url: https://github.com/ICAMS/Kanapy

extra:
  recipe-maintainers:
    - AHartmaier
    - jan-janssen
